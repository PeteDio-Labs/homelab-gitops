apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: mission-control
data:
  # Kubernetes (in-cluster config auto-detected)
  K8S_IN_CLUSTER: "true"

  # Proxmox (TODO: Update with your Proxmox host)
  PROXMOX_HOST: "https://proxmox.homelab.local:8006"

  # Prometheus (TODO: Update with your Prometheus endpoint)
  PROMETHEUS_URL: "http://prometheus-server.observability-stack:9090"

  # Ollama (TODO: Update with your Ollama endpoint)
  OLLAMA_BASE_URL: "http://ollama.dev:11434"
  OLLAMA_MODEL: "mistral"

  # Gemini
  GEMINI_MODEL: "gemini-2.0-flash-exp"

  # ArgoCD (TODO: Update with your ArgoCD endpoint)
  ARGOCD_SERVER: "argocd-server.argocd:443"
