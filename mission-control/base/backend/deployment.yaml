apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-control-backend
  namespace: mission-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mission-control-backend
  template:
    metadata:
      labels:
        app: mission-control-backend
    spec:
      imagePullSecrets:
      - name: nexus-registry
      containers:
      - name: backend
        image: docker.toastedbytes.com/mission-control-backend:develop-latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: POSTGRES_HOST
          value: "postgresql"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "mission_control"
        - name: POSTGRES_USER
          value: "mission_control"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-secret
              key: password
        - name: LOG_LEVEL
          value: "info"
        # TODO: Add K8s, Proxmox, Prometheus, Ollama, Gemini config
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
