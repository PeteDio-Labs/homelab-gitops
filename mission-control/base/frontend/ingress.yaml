apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mission-control-ingress
  namespace: mission-control
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: public
  rules:
  - host: mission-control.homelab.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mission-control-frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: mission-control-backend
            port:
              number: 3000
