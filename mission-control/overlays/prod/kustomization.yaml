apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mission-control

resources:
- ../../base
- sealed-secrets

images:
- name: docker.toastedbytes.com/mission-control-backend
  newTag: main-latest
- name: docker.toastedbytes.com/mission-control-web
  newTag: main-latest

replicas:
- name: mission-control-backend
  count: 2
- name: mission-control-frontend
  count: 2

patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: "500m"
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: "1Gi"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: "2000m"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: "2Gi"
  target:
    kind: Deployment
    name: mission-control-backend

- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: StatefulSet
    name: postgresql

- patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: backend-config
    data:
      LOG_LEVEL: "info"
  target:
    kind: ConfigMap
    name: backend-config

labels:
- pairs:
    environment: prod
